# Reverse proxy Apache2 pour The Hub (Next.js sur PM2, port 3000).
#
# Installation sur le serveur :
#   sudo cp deploy/apache/the-hub-website.conf /etc/apache2/sites-available/
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite the-hub-website
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d flhub.pro -d www.flhub.pro   # ajoute le vhost :443 + redirection HTTPS
#
# Après certbot, tout le trafic passe par le vhost :443 (HTTPS=on), donc
# X-Forwarded-Proto vaut "https" et Auth.js génère des URLs correctes.

<VirtualHost *:80>
    ServerName flhub.pro
    ServerAlias www.flhub.pro

    ProxyPreserveHost On
    ProxyRequests Off

    # Transmet le protocole/host réels au serveur Next.js (derrière le proxy).
    # "https" seulement quand TLS est actif (vhost :443 généré par certbot).
    RequestHeader set X-Forwarded-Proto "https" env=HTTPS

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/flhub-error.log
    CustomLog ${APACHE_LOG_DIR}/flhub-access.log combined
</VirtualHost>
